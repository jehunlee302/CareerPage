- degree: Ph.D.
  institution:
    en: Korea Advanced Institute of Science and Technology (KAIST)
    ko: 한국과학기술원
  period: 2021.03 - 2025.02
  major:
    en: Industrial & Systems Engineering
    ko: 산업및시스템공학과
  region: Daejeon, South Korea
  advisor: Hyun-Jung Kim (https://msslab.kaist.ac.kr/Professor/professor)
  thesis:
    title:
      en: Learning Schedulers for Job Shop Scheduling Problems
      ko: 잡 샵 스케줄링 문제를 위한 학습 기반 스케줄러
    topic:
      en: Proposes three learning-based schedulers to minimize makespan in job shop scheduling problems (JSSP) where each product has a distinct operation sequence. Designed for flexible selection under varying decision-time constraints, all methods generalize to arbitrary problem sizes regardless of training instances.
      ko: 제품마다 공정 순서가 상이한 잡 샵 스케줄링 문제(JSSP)에서 makespan을 최소화하는 세 가지 학습 기반 스케줄러를 제안한다. 의사결정 시간 제약에 따라 유연하게 선택 가능하도록 설계되었으며, 모든 방법론은 훈련 인스턴스와 무관하게 다양한 문제 크기에 확장 적용 가능하다.
    prior_limitations:
      en: GNN-based dispatchers lacked analysis on whether sufficient information was provided for learning optimal strategies. Learning-based local search methods did not fully reflect JSSP-specific characteristics in neighbor selection. Tree-based search could not produce complete solutions under very tight time constraints.
      ko: GNN 기반 디스패처 연구들은 최적 전략 학습에 충분한 정보가 제공되는지 분석이 부족했다. 학습 기반 지역해 탐색은 잡 샵 고유 특성을 이웃해 선택에 충분히 반영하지 못했다. 트리 기반 탐색은 극도로 짧은 시간 제약에서 완전한 해를 탐색하지 못했다.
    methodology:
      en: |
        Three methods proposed:
        1. Learning-based real-time dispatcher: Redesigned state/action/transition using only currently observable information; applied imitation learning instead of RL, achieving superior performance over existing GNN dispatchers.
        2. Learning-based local search: Established makespan improvement conditions based on JSSP characteristics (critical blocks, N5 neighborhood), reflected in policy network trained via RL.
        3. Depth-limited tree search (SBBS): Combined branch-and-bound with beam search in a lookahead manner, using dispatching strategies as rollout policies for graceful degradation under extreme time constraints.
      ko: |
        세 가지 방법론 제안:
        1. 학습 기반 실시간 디스패처: 현재 시점 관측 가능 정보만 활용, 완료 공정 정보 제외하도록 상태/행동/전이 재설계. 강화학습 대신 모방학습(IL) 활용하여 기존 GNN 디스패처 대비 우수한 성능 달성.
        2. 학습 기반 지역해 탐색: 크리티컬 블록, N5 이웃 구조 바탕으로 makespan 개선 조건 정립, 정책 네트워크에 반영하여 RL로 훈련.
        3. 깊이 제한 트리 탐색(SBBS): 분기한정법과 빔 서치를 선행탐색으로 결합, 디스패칭 전략을 롤아웃 정책으로 활용하여 시간 제약이 극도로 짧은 경우에도 자연스럽게 대체 가능하도록 설계.
    performance:
      en: SBBS mathematically proven to always produce schedules equal to or better than dispatching-only solutions in static environments. All three methods evaluated on JSSP benchmarks with comparisons to existing approaches; adaptability verified under dynamic event scenarios.
      ko: 정적 환경에서 SBBS는 기존 디스패칭 전략 대비 항상 같거나 더 나은 성능을 수학적으로 증명. 세 방법론 모두 JSSP 벤치마크에서 평가, 동적 이벤트 시나리오에서도 적응성 검증.
- degree: M.S.
  institution:
    en: Sungkyunkwan University (SKKU)
    ko: 성균관대학교
  period: 2016.09 - 2021.02
  major:
    en: Industrial Engineering
    ko: 산업공학과
  region: Suwon, South Korea
  advisor: Hyun-Jung Kim (https://msslab.kaist.ac.kr/Professor/professor)
  thesis:
    title:
      en: A Genetic Algorithm for Hybrid Flow Shop Scheduling Problems with Multiple Assembly Stages
      ko: 다중 조립 단계를 포함한 하이브리드 플로우 샵 스케줄링을 위한 유전 알고리즘
    topic:
      en: Addresses makespan minimization in hybrid flow shop with multiple assembly stages (MA-HFS), where each product consists of multiple parts processed through parallel-machine stages with possible stage-skipping.
      ko: 3D 프린터와 다중 조립 단계를 포함한 하이브리드 플로우 샵(MA-HFS) 환경에서 전체 공정 시간(makespan)을 최소화하는 문제를 다룬다. 각 제품은 여러 부품으로 구성되며, 부품들은 병렬 기계의 다수 공정 단계를 순서에 따라 거치되 일부 단계는 건너뛸 수 있다.
    prior_limitations:
      en: Prior works (Bhongade & Khodke 2014, Nejati et al. 2016) assumed assembly stages only at the end of the layout or ignored parallel machines, limiting applicability. Simple swap-based neighborhood search failed to exploit assembly-stage structure.
      ko: 기존 연구들은 조립 단계가 레이아웃 후반부에만 위치하는 경우를 가정하거나 단계별 병렬 기계를 고려하지 않는 등 특정 구조에만 적용 가능했다. 조립 단계 특성을 반영하지 않은 단순 swap 기반 이웃 탐색 사용.
    methodology:
      en: |
        Proposed a hybrid genetic algorithm (HGA) with three key contributions:
        1. Extended Johnson's algorithm with novel 'operational ready time' and 'operational remaining time' variables for initial solution generation (IGA).
        2. Designed crossover and mutation operators reflecting assembly structure.
        3. Combined local search on offspring with a lower bound calculation method for MA-HFSSP.
      ko: |
        다중 조립 단계 특성을 반영한 하이브리드 유전 알고리즘(HGA) 제안:
        1. Johnson's algorithm을 확장하여 'operational ready time'과 'operational remaining time' 변수 정의, 초기해 생성 알고리즘(IGA) 개발.
        2. 조립 구조를 고려한 교차(crossover) 및 돌연변이(mutation) 연산자 설계.
        3. 오프스프링에 로컬 서치 적용 + MA-HFSSP 하한값(lower bound) 계산 방법 제시.
    performance:
      en: Achieved superior makespan performance over prior algorithms; outperformed time-limited MIP solver (CPLEX) on large-scale instances.
      ko: 기존 알고리즘 대비 우수한 makespan 성능 달성. 대규모 인스턴스에서 시간 제한 MIP 솔버(CPLEX)보다 뛰어난 결과.
