headline:
  en: Systemic Excellence
  ko: 시스템적 완벽성
lead:
  en: Hiring AI agents to pursue systemic excellence — autonomy under human direction.
  ko: AI 에이전트를 고용해 시스템적 완벽성을 추구합니다 — 사람의 방향 아래 자율 실행.
body:
  en: |
    In the AI era, the most important question is not which model to use, but what problem is worth solving — defined through human will and necessity. Algorithms don't choose direction; people do.

    My direction is to be a keyman: someone who sees the entire system, maps stakeholders, sets priorities, and deeply understands the problems that need solving so direction can be defined. The growth that lasts is the growth where the organization grows together — not where individuals optimize alone.

    Systemic excellence, to me, means hiring AI agents — treating them as employees who execute autonomously, with humans setting direction and confirming key decisions. Chores, basic reviews, missing numbers move into agent pipelines, freeing human attention for the work only humans can do: judgment, strategy, meaning.
  ko: |
    AI 시대에서 가장 중요한 질문은 '어떤 모델을 쓸까'가 아니라 '무엇을 풀 것인가'입니다. 사람의 의지와 필요성에서 출발하는 문제 정의 — 알고리즘은 방향을 정하지 않습니다, 사람이 정합니다.

    제가 지향하는 방향은 keyman입니다. 시스템 전체를 조망하고, 이해관계를 파악하고, 우선순위를 정하고, 해결해야 할 문제를 심도 있게 이해하여 방향성을 설정하는 사람. 진정한 성장은 개인의 최적화가 아닌, 조직이 함께 성장할 때 일어난다고 믿습니다.

    제가 추구하는 시스템적 완벽성은 AI 에이전트를 고용하는 것입니다. 직원처럼 자율적으로 실행하되, 사람이 방향을 정하고 핵심 결정을 확인합니다. 잡무·검토·누락은 에이전트 파이프라인으로 이동하고, 사람은 판단·전략·의미에 집중합니다.
pillars:
  - icon: 🎯
    title:
      en: Problem Definition
      ko: 문제 정의
    desc:
      en: Mapping stakeholders, setting goals and priorities, defining problems shaped by human will and necessity.
      ko: 이해관계 파악, 목표와 우선순위 설정, 사람의 의지와 필요성에서 출발하는 문제 정의.
  - icon: 👥
    title:
      en: Hiring AI Agents
      ko: AI 에이전트 고용
    desc:
      en: Agents execute chores and reviews. Humans focus on judgment, strategy, meaning.
      ko: 에이전트가 잡무·검토를 실행. 사람은 판단·전략·의미에 집중합니다.
  - icon: 🎓
    title:
      en: Continuous Inquiry & Application
      ko: 지속적 탐구와 적용
    desc:
      en: Always exploring, always applying. Insight compounds into mastery.
      ko: 끊임없이 탐구하고 적용합니다. 누적된 통찰이 숙련을 만듭니다.
