      ko: 이해관계와 우선순위를 파악해, 조직이 함께 성장할 방향을 설정합니다.
  - icon: ⚙️
    title:
      en: Automated Foundation
      ko: 자동화된 기반
    desc:
      en: Pipelines absorb chores and reviews. Humans focus on judgment, strategy, meaning.
      ko: 잡무·검토·누락은 파이프라인이. 사람은 판단·전략·의미에 집중합니다.
